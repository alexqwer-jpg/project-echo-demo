<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Echo Test</title>

<style>
body{
background:#05070d;
color:white;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:30px;
}

.card{
background:#111827;
border-radius:20px;
padding:20px;
margin-top:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
font-size:16px;
}
</style>
</head>

<body>

<h1>Project Echo</h1>

<div class="card">
<h2>語音留言（1）</h2>

<p>來電者：UNKNOWN</p>

<p id="msg">
按下播放測試中文
</p>

<button onclick="playVoice()">
▶ 播放留言
</button>
</div>

<script>
function playVoice(){

document.getElementById("msg").innerText =
"喂……\n\n你聽得到嗎？\n\n算了。\n\n還好。\n\n不是空號。";

if("speechSynthesis" in window){

const voice =
new SpeechSynthesisUtterance(
"喂，你聽得到嗎？算了。還好。不是空號。"
);

voice.lang = "zh-TW";
voice.rate = 0.8;
voice.pitch = 0.9;

speechSynthesis.cancel();
speechSynthesis.speak(voice);

}

}
</script>

</body>
</html>
