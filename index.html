<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Project Echo v0.5</title><style>

</style></head><body><div id="app"></div><script>
const T={"title": "Project Echo", "desc": "\u4e00\u652f\u6c92\u6709\u4e3b\u4eba\u7684\u624b\u6a5f\u3002", "hint0": "\u5148\u6aa2\u67e5\u672a\u63a5\u4f86\u96fb\u3002", "hint1": "\u624b\u6a5f\u958b\u59cb\u56de\u61c9\u4f60\u7684\u52d5\u4f5c\u3002", "locked": "\u5c1a\u672a\u89e3\u9396", "back": "\u8fd4\u56de\u684c\u9762", "sync": "SYNC", "call": "Call", "msg": "Msg", "gal": "Gallery", "echo": "ECHO", "ev": "Evidence", "case": "Case", "unknown": "UNKNOWN", "missed": "03:17 / \u672a\u63a5\u4f86\u96fb", "play": "PLAY VOICEMAIL", "voice": "\u5582...\n\n\u4f60\u807d\u5f97\u5230\u55ce\uff1f\n\n\u5176\u5be6\u4e5f\u6c92\u95dc\u4fc2\u3002\n\n\u6211\u53ea\u662f\u60f3\u78ba\u8a8d...\n\n\u9084\u6709\u6c92\u6709\u4eba\u8a18\u5f97\u6211\u3002", "echoUnlocked": "ECHO \u5df2\u89e3\u9396\u3002", "newMsg": "\u65b0\u8a0a\u606f", "newCall": "\u65b0\u7684\u672a\u63a5\u4f86\u96fb", "mira": "MIRA", "m1": "\u4f60\u7d42\u65bc\u4f86\u4e86\u3002", "m2": "\u6709\u500b\u4eba\u5feb\u6d88\u5931\u4e86\u3002", "m3": "\u6211\u8981\u4f60\u5e6b\u6211\u627e\u5230\u4ed6\u3002", "m4": "\u525b\u525b\u90a3\u5f35\u7167\u7247\uff0c\u4e0d\u8981\u518d\u770b\u7b2c\u4e8c\u6b21\u3002", "m5": "\u54f2\u5b87\u7684\u72c0\u614b\u6b63\u5728\u8b8a\u5f97\u4e0d\u7a69\u5b9a\u3002", "profile": "\u4eba\u7269\u6a94\u6848\uff1a\u54f2\u5b87", "profileText": "\u540c\u6b65\u7387\uff1a0%\n\u5b58\u5728\u72c0\u614b\uff1a\u4e0d\u7a69\u5b9a\n\u6700\u5f8c\u7d00\u9304\uff1a\u4e0d\u8981\u8b93\u5979\u4e00\u500b\u4eba\u3002", "view": "\u67e5\u770b\u540c\u6b65\u8cc7\u6599", "shop": "IMG_1924.jpg", "park": "IMG_0317.jpg", "sea": "IMG_DAMAGED.jpg", "shopSub": "\u4fbf\u5229\u5546\u5e97 / \u5b8c\u6574\u5ea6 26%", "parkSub": "\u904a\u6a02\u5712 / \u5b8c\u6574\u5ea6 ", "seaSub": "\u6d77\u908a / \u5b8c\u6574\u5ea6 18%", "save": "\u52a0\u5165\u7dda\u7d22\u5eab", "photoBad": "\u8cc7\u6599\u640d\u6bc0", "parkNote1": "\u756b\u9762\u4e2d\u6709\u6469\u5929\u8f2a\u3001\u9577\u6905\uff0c\u4ee5\u53ca\u53f3\u4e0b\u89d2\u4e0d\u81ea\u7136\u7684\u9670\u5f71\u3002", "parkNote2": "\u9670\u5f71\u8f2a\u5ed3\u8b8a\u5f97\u66f4\u660e\u986f\uff0c\u4f46\u4eba\u7269\u8fa8\u8b58\u4ecd\u7136\u5931\u6557\u3002", "parkNote3": "\u7cfb\u7d71\u8b66\u544a\uff1a\u5075\u6e2c\u5230\u672a\u77e5\u5b58\u5728\u3002", "mark": "\u6a19\u8a18\u7570\u5e38", "home": "HOME (47)", "homeBody": "\u4f60\u5728\u54ea\uff1f\n\n\u56de\u5bb6\u597d\u55ce\uff1f\n\n\u6211\u5f88\u64d4\u5fc3\u4f60\u3002\n\n\u2014\u2014 \u4e09\u5e74\u524d \u2014\u2014\n\n\u6211\u4e0d\u627e\u4f60\u4e86\u3002", "zheyu": "\u54f2\u5b87", "zmsg1": "\u4f60\u770b\u898b\u5979\u4e86\uff1f", "zmsg2": "\u4e0d\u8981\u76f8\u4fe1 ECHO\u3002", "zmsg3": "\u5979\u522a\u6389\u4e86\u5f88\u591a\u6771\u897f\u3002", "read": "\u8b80\u53d6\u8a0a\u606f", "unknownCall1": "......\n\n\u4f60\u770b\u5230\u5979\u4e86\u55ce\uff1f", "unknownCall2": "......\n\n\u5979\u9084\u5728\u7167\u7247\u88e1\u55ce\uff1f", "unknownCall3": "\u4e0d\u8981\u76f8\u4fe1 ECHO\u3002", "listen": "\u63a5\u807d", "evEmpty": "\u5c1a\u672a\u53d6\u5f97\u7dda\u7d22\u3002", "ev1": "\u672a\u77e5\u8a9e\u97f3\uff1a\u6709\u4eba\u60f3\u78ba\u8a8d\u81ea\u5df1\u662f\u5426\u88ab\u8a18\u5f97\u3002", "ev2": "\u904a\u6a02\u5712\u7167\u7247\uff1a\u53f3\u4e0b\u89d2\u6709\u4e0d\u81ea\u7136\u9670\u5f71\uff0c\u4eba\u7269\u8fa8\u8b58\u5931\u6557\u3002", "ev3": "HOME \u8a0a\u606f\uff1a\u4e09\u5e74\u524d\u505c\u6b62\u5c0b\u627e\u54f2\u5b87\u3002", "ev4": "\u4fbf\u5229\u5546\u5e97\u7167\u7247\uff1a\u5169\u7897\u6ce1\u9eb5\uff0c\u4e00\u7897\u6c92\u52d5\u3002", "ev5": "\u6d77\u908a\u6b98\u7247\uff1aDON'T ____ HER ALONE\u3002", "ev6": "\u54f2\u5b87\u8a0a\u606f\uff1a\u4e0d\u8981\u76f8\u4fe1 ECHO\u3002", "timelineHint": "\u7dda\u7d22\u7d44\u5408\uff1a\u54f2\u5b87\u5931\u8e64\u524d\uff0c\u4e00\u76f4\u5728\u5c0b\u627e\u67d0\u500b\u4e0d\u5b58\u5728\u65bc\u8cc7\u6599\u5eab\u7684\u4eba\u3002", "choice": "\u7b2c\u4e00\u6b21\u540c\u6b65\u5206\u6b67", "choiceBody": "MIRA\uff1a\u54f2\u5b87\u7684\u8a18\u61b6\u6b63\u5728\u6c61\u67d3\u7cfb\u7d71\u3002\n\n\u54f2\u5b87\uff1a\u4e0d\u8981\u76f8\u4fe1 MIRA\u3002\u5979\u522a\u6389\u4e86\u5f88\u591a\u6771\u897f\u3002", "trustM": "\u76f8\u4fe1 MIRA", "trustZ": "\u76f8\u4fe1\u54f2\u5b87", "resM": "\u4f60\u9078\u64c7\u76f8\u4fe1 MIRA\u3002\n\n\u540c\u6b65\u7a69\u5b9a\u5ea6\u4e0a\u5347\u3002\n\u4f46\u54f2\u5b87\u7684\u8a0a\u606f\u6d88\u5931\u4e86\u4e00\u90e8\u5206\u3002", "resZ": "\u4f60\u9078\u64c7\u76f8\u4fe1\u54f2\u5b87\u3002\n\n\u54f2\u5b87\u4fe1\u4efb\u5ea6\u4e0a\u5347\u3002\n\u4f46 ECHO \u6b0a\u9650\u958b\u59cb\u4e0d\u7a69\u5b9a\u3002", "end": "CASE-01", "endBody": "\u6d88\u5931\u7684\u904a\u6a02\u5712\n\n\u540c\u6b65\u7387\uff1aSYNC%\n\n\u7372\u5f97\u56de\u97f3\u788e\u7247\uff1a\u7167\u7247\u4e2d\u7684\u672a\u77e5\u5b58\u5728\n\n\u6700\u5f8c\u4f86\u96fb\uff1a\n\u4f60\u7d42\u65bc\u767c\u73fe\u4e86\u3002\n\u4f46\u4f60\u627e\u932f\u4eba\u4e86\u3002", "question": "\u5979\u662f\u8ab0\uff1f"};let s="desk",echo=0,call=0,seen=0,home=0,sync=0,park=23,callN=0,msgN=0,echoN=0,choice=0;let ev=[];const A=()=>document.getElementById("app");
function set(x){A().innerHTML='<div class=top><span>03:17</span><span>'+T.sync+' '+sync+'% 87%</span></div>'+x}function go(x){s=x;if(x==="echo")echoN=0;if(x==="call")callN=0;if(x==="msg")msgN=0;render()}function vib(){if(navigator.vibrate)navigator.vibrate([60,30,60])}function addS(n){sync=Math.min(99,sync+n);park=Math.min(88,park+n*2)}function addEv(e){if(!ev.includes(e))ev.push(e)}function toast(t){let d=document.createElement("div");d.className="toast";d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2200);vib()}
function app(label,sc,locked,dot){return '<button class="app '+(locked?'lock':'')+'" onclick="'+(locked?'alert(T.locked)':'go(\''+sc+'\')')+'">'+label+(dot?'<span class=dot>'+dot+'</span>':'')+'</button>'}
function triggerAfterCall(){msgN++;toast(T.newMsg);}function triggerAfterPhoto(){callN++;echoN++;toast(T.newCall);}function triggerAfterHome(){echoN++;addS(4);toast("ECHO updated");}
function render(){
 if(s=="desk")return set('<h1>'+T.title+'</h1><div class=sub>'+T.desc+'</div><div class=grid>'+app(T.call,"call",0,callN||(!call?1:0))+app(T.msg,"msg",!home,msgN||(home?47:0))+app(T.gal,"gal",0,0)+app(T.ev,"evi",ev.length<1,0)+app(T.echo,"echo",!echo,echoN)+app(T.case,"choice",ev.length<4,0)+'</div><p class=sub style="text-align:center;margin-top:30px">'+(echo?T.hint1:T.hint0)+'</p>');
 if(s=="call")return set('<h1>'+T.unknown+'</h1><div class=card><div class=sub>'+T.missed+'</div>'+(call?'<div class=log>'+T.voice+'</div><p class=ok>'+T.echoUnlocked+'</p><button onclick="listenUnknown()">'+T.listen+' UNKNOWN</button>':'<button onclick="call=1;echo=1;addEv(T.ev1);addS(3);triggerAfterCall();render()">'+T.play+'</button>')+'</div><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
 if(s=="echo")return set('<h1>'+T.mira+'</h1><div class=msg>'+T.m1+'</div><div class=msg>'+T.m2+'</div><div class=msg>'+T.m3+'</div>'+(seen?'<div class=msg>'+T.m4+'</div>':'')+(home?'<div class=msg>'+T.m5+'</div>':'')+'<div class=card><b>'+T.profile+'</b><p class=log>'+T.profileText+'</p></div><button onclick="home=1;go(\'gal\')">'+T.view+'</button><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
 if(s=="gal")return set('<h1>'+T.gal+'</h1><div class=photo onclick="photo(\'shop\')">'+T.shop+'<br><span class=sub>'+T.shopSub+'</span></div><div class=photo onclick="go(\'park\')">'+T.park+'<br><span class=sub>'+T.parkSub+park+'%</span></div><div class=photo onclick="photo(\'sea\')">'+T.sea+'<br><span class=sub>'+T.seaSub+'</span></div><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
 if(s=="park")return set('<h1>'+T.park+'</h1><div class=box><div class=damage>####<br>#  #  #<br>## ? ##<br>########</div><div class=shadow>?</div><div class=badge>'+T.warn+'</div></div><p class=sub>'+(park<45?T.parkNote1:park<70?T.parkNote2:T.parkNote3)+'</p><div class=barbox><div class=bar style="width:'+park+'%"></div></div><button onclick="seen=1;home=1;addEv(T.ev2);addS(5);triggerAfterPhoto();go(\'sys\')">'+T.mark+'</button><button class=dark onclick="go(\'gal\')">'+T.back+'</button>');
 if(s=="sys")return set('<h1>'+T.photoBad+'</h1><div class=card log>'+T.sysBody+'</div><button onclick="go(\'desk\')">'+T.back+'</button>');
 if(s=="msg")return set('<h1>'+T.msg+'</h1><div class=card><h2>'+T.home+'</h2><div class=log>'+T.homeBody+'</div><button onclick="addEv(T.ev3);home=1;triggerAfterHome();render()">'+T.save+'</button></div>'+(seen?'<div class=card><h2>'+T.zheyu+'</h2><p class=warn>'+T.zmsg1+'</p><p class=warn>'+T.zmsg2+'</p><p class=warn>'+T.zmsg3+'</p><button onclick="addEv(T.ev6);go(\'choice\')">'+T.read+'</button></div>':'')+'<button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
 if(s=="evi")return set('<h1>'+T.ev+'</h1>'+(ev.length?ev.map((e,i)=>'<div class=card><b>#00'+(i+1)+'</b><p class=log>'+e+'</p></div>').join(''):'<div class=card>'+T.evEmpty+'</div>')+(ev.length>=4?'<div class=card log>'+T.timelineHint+'</div>':'')+'<button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
 if(s=="choice")return set('<h1>'+T.choice+'</h1><div class=card log>'+T.choiceBody+'</div><button onclick="choice=1;addS(7);result(T.resM)">'+T.trustM+'</button><button onclick="choice=2;addS(7);result(T.resZ)">'+T.trustZ+'</button><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
 if(s=="result")return set('<h1>'+T.choice+'</h1><div class=card log>'+window.r+'</div><button onclick="go(\'end\')">OK</button>');
 if(s=="end")return set('<h1>'+T.end+'</h1><div class=card log>'+T.endBody.replace("SYNC",sync)+'</div><h1>'+T.question+'</h1><button onclick="go(\'desk\')">'+T.back+'</button>');
}
function photo(k){let e=k=="shop"?T.ev4:T.ev5;addEv(e);addS(3);set('<h1>'+(k=="shop"?T.shop:T.sea)+'</h1><div class=box><div class=damage>DATA DAMAGED<br>###  ##<br>??  ##</div></div><div class=card>'+e+'</div><button onclick="go(\'gal\')">'+T.back+'</button>')}
function listenUnknown(){let m=callN>0?(seen?(choice?T.unknownCall3:T.unknownCall2):T.unknownCall1):T.voice;set('<h1>'+T.unknown+'</h1><div class=card log>'+m+'</div><button onclick="go(\'desk\')">'+T.back+'</button>')}
function result(x){window.r=x;s="result";render()}render();
</script></body></html>
