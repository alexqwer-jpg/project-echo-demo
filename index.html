<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Project Echo</title><style>
body{margin:0;background:#000;color:#eef;font-family:sans-serif}#app{max-width:430px;margin:auto;min-height:100vh;background:radial-gradient(circle at top,#18233a,#05070d 60%,#000);padding:18px;box-sizing:border-box}.top{display:flex;justify-content:space-between;color:#cbd3e8}h1{font-size:28px}.sub{color:#9aa6bd;line-height:1.7}.card,.photo,.msg{background:#121827;border:1px solid #334;border-radius:20px;padding:16px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:35px}.app{height:86px;border:0;border-radius:20px;background:#182034;color:#fff;font-size:17px;font-weight:800;position:relative}.lock{opacity:.42}.dot{position:absolute;top:8px;right:8px;background:#ff4964;border-radius:99px;padding:2px 7px;font-size:12px}button{width:100%;padding:14px;border:0;border-radius:15px;margin:8px 0;font-weight:800}.dark{background:#182034;color:#eef;border:1px solid #445}.log{white-space:pre-line;line-height:1.8}.warn{color:#ff7777}.ok{color:#72ffb2}.box{height:250px;background:#222;border-radius:18px;display:flex;align-items:center;justify-content:center;position:relative}.blur{filter:blur(5px);font-size:40px}.badge{position:absolute;bottom:12px;right:12px;background:#5b1f2b;color:#ffb3c0;padding:6px 10px;border-radius:99px;font-size:12px}select,input{width:100%;padding:13px;border-radius:14px;border:1px solid #445;background:#0f1626;color:#eef;margin:8px 0;font-size:16px}
</style></head><body><div id="app"></div><script>
const T={"title": "Project Echo", "desc": "\u4e00\u652f\u6c92\u6709\u4e3b\u4eba\u7684\u624b\u6a5f\u3002", "check": "\u5148\u6aa2\u67e5\u672a\u63a5\u4f86\u96fb\u3002", "call": "\u901a\u8a71", "msg": "\u8a0a\u606f", "gal": "\u76f8\u7c3f", "echo": "ECHO", "ev": "\u7dda\u7d22", "time": "\u6642\u9593\u7dda", "pass": "\u5bc6\u78bc\u9396", "case": "CASE", "back": "\u8fd4\u56de\u684c\u9762", "unknown": "UNKNOWN", "missed": "03:17 / \u672a\u63a5\u4f86\u96fb", "play": "\u25b6 \u64ad\u653e\u7559\u8a00", "voice": "\u5582...\n\n\u4f60\u807d\u5f97\u5230\u55ce\uff1f\n\n\u5176\u5be6\u4e5f\u6c92\u95dc\u4fc2\u3002\n\n\u6211\u53ea\u662f\u60f3\u78ba\u8a8d...\n\n\u9084\u6709\u6c92\u6709\u4eba\u8a18\u5f97\u6211\u3002", "unlocked": "ECHO \u5df2\u89e3\u9396\u3002", "mira": "MIRA", "m1": "\u4f60\u7d42\u65bc\u4f86\u4e86\u3002", "m2": "\u6709\u500b\u4eba\u5feb\u6d88\u5931\u4e86\u3002", "m3": "\u6211\u8981\u4f60\u5e6b\u6211\u627e\u5230\u4ed6\u3002", "profile": "\u4eba\u7269\u6a94\u6848\uff1a\u54f2\u5b87", "profileText": "\u540c\u6b65\u7387\uff1a0%\n\u5b58\u5728\u72c0\u614b\uff1a\u4e0d\u7a69\u5b9a\n\u6700\u5f8c\u7d00\u9304\uff1a\u4e0d\u8981\u8b93\u5979\u4e00\u500b\u4eba\u3002", "view": "\u67e5\u770b\u540c\u6b65\u8cc7\u6599", "shop": "\u4fbf\u5229\u5546\u5e97", "park": "\u904a\u6a02\u5712", "sea": "\u6d77\u908a", "shopSub": "\u96e8\u591c\uff0c\u5169\u7897\u6ce1\u9eb5\u3002", "parkSub": "2018/07/21", "seaSub": "\u6a94\u6848\u53d7\u640d\u3002", "warn": "\u4eba\u7269\u8fa8\u8b58\u5931\u6557", "parkDesc": "2018/07/21\u3002\u54f2\u5b87\u8eab\u908a\u6709\u4e00\u500b\u6a21\u7cca\u7684\u4eba\u5f71\u3002", "mark": "\u6a19\u8a18\u7570\u5e38", "sys": "\u7cfb\u7d71\u7570\u5e38", "sysBody": "\u4eba\u7269\u8fa8\u8b58\u5931\u6557\u3002\n\n\u5075\u6e2c\u5230\u672a\u77e5\u5b58\u5728\u3002\n\nMIRA\uff1a\u4e0d\u8981\u4e00\u76f4\u770b\u90a3\u5f35\u7167\u7247\u3002", "home": "HOME (47)", "homeBody": "\u4f60\u5728\u54ea\uff1f\n\n\u56de\u5bb6\u597d\u55ce\uff1f\n\n\u6211\u5f88\u64d4\u5fc3\u4f60\u3002\n\n\u2014\u2014 \u4e09\u5e74\u524d \u2014\u2014\n\n\u6211\u4e0d\u627e\u4f60\u4e86\u3002", "zheyu": "\u54f2\u5b87", "zmsg": "\u4f60\u770b\u898b\u5979\u4e86\uff1f", "read": "\u8b80\u53d6\u8a0a\u606f", "evEmpty": "\u5c1a\u672a\u53d6\u5f97\u7dda\u7d22\u3002", "ev1": "\u672a\u77e5\u8a9e\u97f3\uff1a\u6709\u4eba\u60f3\u78ba\u8a8d\u81ea\u5df1\u662f\u5426\u88ab\u8a18\u5f97\u3002", "ev2": "\u904a\u6a02\u5712\u7167\u7247\uff1a\u6a21\u7cca\u5973\u5b69\uff0c\u4eba\u7269\u8fa8\u8b58\u5931\u6557\u3002", "ev3": "HOME \u8a0a\u606f\uff1a\u4e09\u5e74\u524d\u505c\u6b62\u5c0b\u627e\u54f2\u5b87\u3002", "ev4": "\u4fbf\u5229\u5546\u5e97\u7167\u7247\uff1a\u5169\u7897\u6ce1\u9eb5\uff0c\u4e00\u7897\u6c92\u52d5\u3002", "ev5": "\u6d77\u908a\u6b98\u7247\uff1a\u4e0d\u8981\u8b93\u5979\u4e00\u500b\u4eba\u3002", "save": "\u52a0\u5165\u7dda\u7d22\u5eab", "timeline": "\u8acb\u6392\u5217\u4e8b\u4ef6\u9806\u5e8f\u3002", "t1": "\u904a\u6a02\u5712\u7167\u7247", "t2": "HOME \u6700\u5f8c\u8a0a\u606f", "t3": "03:17 \u672a\u63a5\u4f86\u96fb", "checkTime": "\u78ba\u8a8d\u9806\u5e8f", "timeOk": "\u6642\u9593\u7dda\u7a69\u5b9a\u3002\u540c\u6b65\u7387 +10%\u3002", "timeBad": "\u9806\u5e8f\u4e0d\u7a69\u5b9a\u3002\u518d\u60f3\u4e00\u6b21\u3002", "passHint": "\u63d0\u793a\uff1a\u6240\u6709\u7570\u5e38\u90fd\u505c\u5728\u540c\u4e00\u500b\u6642\u9593\u3002", "unlock": "\u89e3\u9396", "passOk": "\u8cc7\u6599\u593e\u5df2\u89e3\u9396\uff1a\u54f2\u5b87\u65e5\u8a18\u3002", "passBad": "\u5bc6\u78bc\u932f\u8aa4\u3002", "diary": "\u54f2\u5b87\u65e5\u8a18\uff1a\n\n\u5979\u9072\u5230\u4e86\u3002\n\n\u4f46\u6211\u5fd8\u4e86\u5979\u662f\u8ab0\u3002\n\n\u6211\u53ea\u8a18\u5f97\uff0c\u6211\u4e0d\u80fd\u8b93\u5979\u4e00\u500b\u4eba\u3002", "choice": "\u7b2c\u4e00\u6b21\u540c\u6b65\u5206\u6b67", "choiceBody": "MIRA\uff1a\u54f2\u5b87\u7684\u8a18\u61b6\u6b63\u5728\u6c61\u67d3\u7cfb\u7d71\u3002\n\n\u54f2\u5b87\uff1a\u4e0d\u8981\u76f8\u4fe1 MIRA\u3002\u5979\u522a\u6389\u4e86\u5f88\u591a\u6771\u897f\u3002", "trustM": "\u76f8\u4fe1 MIRA", "trustZ": "\u76f8\u4fe1\u54f2\u5b87", "resM": "\u4f60\u9078\u64c7\u76f8\u4fe1 MIRA\u3002\n\n\u540c\u6b65\u7a69\u5b9a\u5ea6\u4e0a\u5347\u3002\n\u4f46\u54f2\u5b87\u7684\u8a0a\u606f\u6d88\u5931\u4e86\u4e00\u90e8\u5206\u3002", "resZ": "\u4f60\u9078\u64c7\u76f8\u4fe1\u54f2\u5b87\u3002\n\n\u54f2\u5b87\u4fe1\u4efb\u5ea6\u4e0a\u5347\u3002\n\u4f46 ECHO \u6b0a\u9650\u958b\u59cb\u4e0d\u7a69\u5b9a\u3002", "end": "CASE-01", "endBody": "\u6d88\u5931\u7684\u904a\u6a02\u5712\n\n\u540c\u6b65\u7387\uff1aSYNC%\n\n\u7372\u5f97\u56de\u97f3\u788e\u7247\uff1a\u7167\u7247\u4e2d\u7684\u672a\u77e5\u5b58\u5728\n\n\u6700\u5f8c\u8a0a\u606f\uff1a\u300c\u4f60\u770b\u898b\u5979\u4e86\uff1f\u300d", "question": "\u5979\u662f\u8ab0\uff1f", "locked": "\u5c1a\u672a\u89e3\u9396", "need": "\u9700\u8981\u5148\u53d6\u5f97\u66f4\u591a\u7dda\u7d22\u3002"};let s="desk",echo=0,call=0,seen=0,home=0,folder=0,sync=0,ev=[];const A=()=>document.getElementById("app");
function set(x){A().innerHTML='<div class=top><span>03:17</span><span>SYNC '+sync+'% 87%</span></div>'+x}
function go(x){s=x;render()}function vib(){if(navigator.vibrate)navigator.vibrate([50,30,50])}function add(e){if(!ev.includes(e))ev.push(e)}function addS(n){sync=Math.min(99,sync+n)}
function app(label,sc,locked,dot){return '<button class="app '+(locked?'lock':'')+'" onclick="'+(locked?'alert(T.locked)':'go(\''+sc+'\')')+'">'+label+(dot?'<span class=dot>'+dot+'</span>':'')+'</button>'}
function render(){
if(s=="desk")return set('<h1>'+T.title+'</h1><div class=sub>'+T.desc+'</div><div class=grid>'+app("Call","call",0,call?0:1)+app("Msg","msg",!home,home?47:0)+app("Gallery","gal",0,0)+app("Evidence","evi",ev.length<1,0)+app("Timeline","time",ev.length<3,0)+app("Passcode","pass",ev.length<4,0)+app("ECHO","echo",!echo,0)+app("Case","choice",!folder,0)+'</div><p class=sub style="text-align:center;margin-top:30px">'+(echo?T.need:T.check)+'</p>');
if(s=="call")return set('<h1>'+T.unknown+'</h1><div class=card><div class=sub>'+T.missed+'</div>'+(call?'<div class=log>'+T.voice+'</div><p class=ok>'+T.unlocked+'</p>':'<button onclick="call=1;echo=1;add(T.ev1);addS(3);vib();render()">'+T.play+'</button>')+'</div><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="echo")return set('<h1>'+T.mira+'</h1><div class=msg>'+T.m1+'</div><div class=msg>'+T.m2+'</div><div class=msg>'+T.m3+'</div><div class=card><b>'+T.profile+'</b><p class=log>'+T.profileText+'</p></div><button onclick="home=1;go(\'gal\')">'+T.view+'</button><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="gal")return set('<h1>'+T.gal+'</h1><div class=photo onclick="photo(\'shop\')">Shop<br><span class=sub>'+T.shopSub+'</span></div><div class=photo onclick="go(\'park\')">Park<br><span class=sub>'+T.parkSub+'</span></div><div class=photo onclick="photo(\'sea\')">Sea<br><span class=sub>'+T.seaSub+'</span></div><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="park")return set('<h1>'+T.park+'</h1><div class=box><div style="font-size:44px">PARK</div><div class=blur style="position:absolute;right:85px;bottom:60px">?</div><div class=badge>'+T.warn+'</div></div><p class=sub>'+T.parkDesc+'</p><button onclick="seen=1;home=1;add(T.ev2);addS(5);go(\'sys\')">'+T.mark+'</button><button class=dark onclick="go(\'gal\')">'+T.back+'</button>');
if(s=="sys")return set('<h1>'+T.sys+'</h1><div class=card log>'+T.sysBody+'</div><button onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="msg")return set('<h1>'+T.msg+'</h1><div class=card><h2>'+T.home+'</h2><div class=log>'+T.homeBody+'</div><button onclick="add(T.ev3);addS(4);render()">'+T.save+'</button></div>'+(seen?'<div class=card><h2>'+T.zheyu+'</h2><p class=warn>'+T.zmsg+'</p><button onclick="go(\'end\')">'+T.read+'</button></div>':'')+'<button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="evi")return set('<h1>'+T.ev+'</h1>'+(ev.length?ev.map((e,i)=>'<div class=card><b>#00'+(i+1)+'</b><p class=log>'+e+'</p></div>').join(''):'<div class=card>'+T.evEmpty+'</div>')+'<button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="time")return set('<h1>'+T.time+'</h1><div class=card>'+T.timeline+'</div>'+sel(1)+sel(2)+sel(3)+'<button onclick="checkTime()">'+T.checkTime+'</button><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="pass")return set('<h1>'+T.pass+'</h1><div class=card>'+T.passHint+'</div><input id=p maxlength=4 placeholder="0317"><button onclick="checkPass()">'+T.unlock+'</button><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="diary")return set('<h1>'+T.passOk+'</h1><div class=card log>'+T.diary+'</div><button onclick="folder=1;addS(5);go(\'choice\')">OK</button>');
if(s=="choice")return set('<h1>'+T.choice+'</h1><div class=card log>'+T.choiceBody+'</div><button onclick="res(T.resM)">'+T.trustM+'</button><button onclick="res(T.resZ)">'+T.trustZ+'</button><button class=dark onclick="go(\'desk\')">'+T.back+'</button>');
if(s=="result")return set('<h1>'+T.choice+'</h1><div class=card log>'+window.r+'</div><button onclick="go(\'end\')">OK</button>');
if(s=="end")return set('<h1>'+T.end+'</h1><div class=card log>'+T.endBody.replace("SYNC",sync)+'</div><h1>'+T.question+'</h1><button onclick="go(\'desk\')">'+T.back+'</button>');
}
function photo(k){let e=k=="shop"?T.ev4:T.ev5;add(e);addS(3);set('<h1>'+(k=="shop"?T.shop:T.sea)+'</h1><div class=box>'+(k=="shop"?T.shop:T.sea)+'</div><div class=card>'+e+'</div><button onclick="go(\'gal\')">'+T.back+'</button>')}
function sel(i){return '<select id=t'+i+'><option>'+T.t1+'</option><option>'+T.t2+'</option><option>'+T.t3+'</option></select>'}
function checkTime(){let a=[t1.value,t2.value,t3.value].join("|");if(a==T.t1+"|"+T.t2+"|"+T.t3){addS(10);alert(T.timeOk);go("desk")}else alert(T.timeBad)}
function checkPass(){if(document.getElementById("p").value=="0317")go("diary");else alert(T.passBad)}
function res(x){window.r=x;addS(7);s="result";render()}render();
</script></body></html>
