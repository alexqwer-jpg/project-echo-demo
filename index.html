
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Project Echo v0.2</title>
<style>
html,body{margin:0;padding:0;background:#000;color:#f2f4fa;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;overflow:hidden;height:100%}
#app{position:relative;width:100vw;height:100vh;background:radial-gradient(circle at top,#1a2030 0%,#090b11 45%,#000 100%);overflow:hidden}
.screen{position:absolute;inset:0;display:none;padding:20px}
.active{display:block}
.top{display:flex;justify-content:space-between;font-size:12px;color:#d8deef}
.locktime{margin-top:90px;font-size:72px;font-weight:200;text-align:center}
.notice{margin:80px auto 0;background:rgba(20,23,30,.8);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:18px;max-width:360px}
.noticeTitle{display:flex;justify-content:space-between;font-weight:700}
.noticeBody{margin-top:10px;line-height:1.6;color:#d5d9e3}
.hint{position:absolute;bottom:30px;left:0;right:0;text-align:center;opacity:.7}
.homeTitle{margin-top:55px;font-size:28px;font-weight:700}
.sub{color:#97a0b4;margin-top:6px;font-size:13px}
.grid{margin-top:30px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.iconBtn{background:none;border:none;color:white;display:flex;flex-direction:column;align-items:center}
.icon{width:64px;height:64px;border-radius:18px;background:#161b27;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;border:1px solid rgba(255,255,255,.08)}
.badge{position:absolute;top:-5px;right:-5px;background:#ff405c;border-radius:999px;min-width:20px;height:20px;line-height:20px;font-size:11px;font-weight:700}
.label{margin-top:8px;font-size:12px}
.header{margin-top:35px;display:flex;align-items:center;gap:12px}
.back{width:40px;height:40px;border:none;border-radius:12px;background:#141925;color:white;font-size:22px}
.title{font-size:24px;font-weight:700}
.card{margin-top:22px;padding:18px;border-radius:22px;background:#11151d;border:1px solid rgba(255,255,255,.08)}
.case{font-size:26px;font-weight:800;margin-top:8px}
.text{margin-top:14px;line-height:1.8;color:#d0d5e0}
.btn{width:100%;margin-top:14px;height:52px;border:none;border-radius:18px;font-size:16px;font-weight:700}
.primary{background:#e7ecff;color:#000}
.secondary{background:#181d28;color:white}
.chat{position:absolute;top:95px;left:0;right:0;bottom:80px;overflow:auto;padding:0 18px}
.bubble{max-width:80%;padding:12px 14px;border-radius:18px;margin:12px 0;line-height:1.6}
.mira{background:#172036;border-bottom-left-radius:4px}
.user{background:#edf1ff;color:#000;margin-left:auto;border-bottom-right-radius:4px}
.choices{position:absolute;bottom:14px;left:14px;right:14px;display:flex;gap:8px}
.choice{flex:1;height:46px;border:none;border-radius:16px;background:#171c27;color:white}
.memory{display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;height:100%}
.big{font-size:32px;letter-spacing:4px;font-weight:200}
.small{margin-top:18px;line-height:1.8;color:#a5adbe}
.flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none}
.flash.on{animation:flash .9s ease-out}
@keyframes flash{0%{opacity:0}35%{opacity:.9}100%{opacity:0}}
</style>
</head>
<body>
<div id="app">
<div class="flash" id="flash"></div>

<section id="lock" class="screen active">
<div class="top"><span>03:17</span><span>Project Echo</span></div>
<div class="locktime">03:17</div>
<div class="notice" onclick="unlock()">
<div class="noticeTitle"><span>未接來電（17）</span><span>現在</span></div>
<div class="noticeBody">來電者：未知人格<br><br>「不要掛掉。」</div>
</div>
<div class="hint">點擊通知</div>
</section>

<section id="home" class="screen">
<div class="top"><span>03:17</span><span id="sync">同步率 19%</span></div>
<div class="homeTitle">早安，Kane。</div>
<div class="sub" id="subtext">MIRA 正在觀測你的狀態。</div>

<div class="grid">
<button class="iconBtn" onclick="openScreen('calls')">
<div class="icon">☎<div class="badge" id="badge">17</div></div>
<div class="label">通話</div>
</button>

<button class="iconBtn" onclick="openScreen('messages')">
<div class="icon">💬</div>
<div class="label">訊息</div>
</button>

<button class="iconBtn" onclick="openScreen('case1')">
<div class="icon">◇</div>
<div class="label">同步局</div>
</button>
</div>
</section>

<section id="calls" class="screen">
<div class="header">
<button class="back" onclick="openScreen('home')">‹</button>
<div class="title">通話紀錄</div>
</div>

<div class="card">
<div style="color:#ff5970;font-weight:700;">未知人格</div>
<div class="text">
03:17<br>03:16<br>03:15<br><br>
沒有發話來源。
</div>

<button class="btn primary" onclick="voice()">播放錄音</button>
</div>
</section>

<section id="messages" class="screen">
<div class="header">
<button class="back" onclick="openScreen('home')">‹</button>
<div class="title">MIRA</div>
</div>

<div class="chat" id="chat">
<div class="bubble mira">Kane。<br><br>你今天又沒有睡。</div>
<div class="bubble mira">來電持續了三個小時。</div>
</div>

<div class="choices">
<button class="choice" onclick="reply(1)">為什麼？</button>
<button class="choice" onclick="reply(2)">接通它。</button>
</div>
</section>

<section id="case1" class="screen">
<div class="header">
<button class="back" onclick="openScreen('home')">‹</button>
<div class="title">CASE-01</div>
</div>

<div class="card">
<div class="case">不存在的來電</div>
<div class="text">
死者手機已停止運作。<br><br>
但每天凌晨 03:17。<br>
家屬手機仍會收到同一通電話。
</div>

<button class="btn primary" onclick="memory()">
進入人格殘響
</button>
</div>
</section>

<section id="memory" class="screen">
<div class="memory">
<div class="big">WHITE TERMINAL</div>
<div class="small" id="memoryText">
請確認。<br>
你仍然記得自己的名字。
</div>
<button class="btn primary" style="max-width:280px" onclick="nextMemory()">繼續</button>
</div>
</section>

</div>

<script>
const screens=['lock','home','calls','messages','case1','memory'];
let step=0;

function openScreen(id){
screens.forEach(s=>document.getElementById(s).classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function unlock(){
openScreen('home');
buzz();
setTimeout(()=>notify('MIRA','你剛剛停在鎖屏 12 秒。'),1500);
}

function reply(v){
const c=document.getElementById('chat');
if(v===1){
c.innerHTML+=`<div class="bubble user">為什麼？</div><div class="bubble mira">因為那不像電話。<br><br>比較像某段人格。<br>正在尋找願意回應它的人。</div>`;
}else{
c.innerHTML+=`<div class="bubble user">接通它。</div><div class="bubble mira">Kane。<br><br>你其實知道。<br>自己想接的不是電話。</div>`;
buzz();
}
c.scrollTop=c.scrollHeight;
}

function memory(){
openScreen('memory');
flash();
buzz();
}

function nextMemory(){
step++;
const t=document.getElementById('memoryText');

if(step===1){
t.innerHTML='車廂裡沒有人。<br><br>但每個座位都像剛剛有人離開。';
flash();
}
else if(step===2){
t.innerHTML='廣播：請不要刪除我。<br><br>廣播：請不要讓她忘記我。';
flash();
}
else if(step===3){
t.innerHTML='你終於明白。<br><br>不是死者一直打來。<br><br>是活著的人一直不肯掛斷。';
flash();
voice();
}
else{
openScreen('home');
document.getElementById('badge').innerText='18';
document.getElementById('sync').innerText='同步率 31%';
document.getElementById('subtext').innerText='人格穩定：偏移';
notify('MIRA','同步率提升。');
buzz();
}
}

function flash(){
const f=document.getElementById('flash');
f.classList.remove('on');
void f.offsetWidth;
f.classList.add('on');
}

function notify(title,text){
const n=document.createElement('div');
n.className='notice';
n.style.position='absolute';
n.style.top='50px';
n.style.left='20px';
n.style.right='20px';
n.style.margin='0';
n.style.zIndex='50';
n.innerHTML=`<div class="noticeTitle"><span>${title}</span><span>現在</span></div><div class="noticeBody">${text}</div>`;
document.getElementById('app').appendChild(n);
setTimeout(()=>n.remove(),4000);
}

function buzz(){
if(navigator.vibrate){navigator.vibrate([60,40,60]);}
}

function voice(){
notify('UNKNOWN','不要掛掉。');

const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type='sawtooth';
osc.frequency.value=120;
gain.gain.value=0.02;

osc.connect(gain);
gain.connect(ctx.destination);
osc.start();

setTimeout(()=>{
osc.stop();
ctx.close();
},700);
}

setInterval(()=>{
if(document.getElementById('home').classList.contains('active')){
if(Math.random()>.75){
const b=document.getElementById('badge');
b.innerText=parseInt(b.innerText)+1;
notify('未知人格','未接來電');
buzz();
}
}
},20000);
</script>
</body>
</html>
